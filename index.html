<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Haderach Fleet Monitor</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--amber:#d29922;--accent:#58a6ff;--chip:#21262d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:16px;-webkit-font-smoothing:antialiased;}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;}
  #gate h2{font-weight:600;font-size:20px;}
  #gate input{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:16px;width:240px;text-align:center;}
  #gate button{background:var(--accent);color:#0d1117;border:none;padding:11px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
  #gate .err{color:var(--red);font-size:13px;height:16px;}
  #app{display:none;max-width:1200px;margin:0 auto;}
  .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .header .host{color:var(--muted);font-size:13px;font-weight:400;margin-left:6px;}
  .header .meta{color:var(--muted);font-size:12px;}
  .header .meta .refresh{color:var(--accent);cursor:pointer;text-decoration:none;}
  .sysbar{display:flex;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;}
  .sysitem{display:flex;flex-direction:column;gap:2px;min-width:90px;}
  .sysitem .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
  .sysitem .v{font-size:15px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .15s,transform .1s;cursor:pointer;}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .card.down{opacity:.6;border-color:var(--red);}
  .card .top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
  .card img.av{width:46px;height:46px;border-radius:10px;object-fit:cover;background:var(--panel2);}
  .card .nm{flex:1;min-width:0;}
  .card .nm .n{font-size:15px;font-weight:600;}
  .card .nm .r{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .nm .p{font-size:11px;color:var(--muted);}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .badge.up{background:rgba(63,185,80,.15);color:var(--green);}
  .badge.down{background:rgba(248,81,73,.15);color:var(--red);}
  .badge.frozen{background:rgba(139,148,158,.12);color:var(--muted);}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;font-size:13px;}
  .stat{display:flex;justify-content:space-between;background:var(--chip);padding:5px 9px;border-radius:6px;}
  .stat .sl{color:var(--muted);}
  .stat .sv{font-weight:600;}
  .stat .sv.warn{color:var(--amber);}
  .stat .sv.bad{color:var(--red);}
  .chans{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
  .chan{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;background:var(--chip);color:var(--muted);}
  .chan.tg{background:rgba(88,166,255,.15);color:#58a6ff;}
  .chan.wa{background:rgba(63,185,80,.15);color:#3fb950;}
  .chan.dc{background:rgba(138,99,255,.18);color:#a98bff;}
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:20px;padding-bottom:10px;}
  /* detail overlay */
  #detail{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px;}
  .dpanel{max-width:960px;margin:0 auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;}
  .dhead{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .dhead img{width:60px;height:60px;border-radius:12px;object-fit:cover;}
  .dhead .dn{flex:1;}
  .dhead .dn .dname{font-size:20px;font-weight:700;}
  .dhead .dn .dsub{font-size:12px;color:var(--muted);margin-top:3px;}
  .dclose{background:var(--chip);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;}
  .dsection{margin-bottom:18px;}
  .dsh{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:8px;font-weight:700;}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .mcell{background:var(--chip);border-radius:8px;padding:8px 11px;}
  .mcell .ml{font-size:11px;color:var(--muted);}
  .mcell .mv{font-size:14px;font-weight:600;margin-top:2px;}
  .skilltags{display:flex;flex-wrap:wrap;gap:5px;}
  .skilltag{font-size:11px;background:var(--chip);border:1px solid var(--border);border-radius:12px;padding:3px 9px;color:var(--text);}
  table.crons{width:100%;border-collapse:collapse;font-size:12px;}
  table.crons td{padding:5px 8px;border-bottom:1px solid var(--border);}
  table.crons .cn{font-weight:600;}
  table.crons .cs{color:var(--muted);}
  table.crons .cok{color:var(--green);text-align:right;white-space:nowrap;}
  table.crons .cerr{color:var(--red);text-align:right;white-space:nowrap;}
  table.crons .coff{opacity:.45;}
  .txbox{background:#010409;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.6;max-height:340px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
  .muted{color:var(--muted);font-size:13px;}
  .upi{color:var(--green);font-size:13px;} .downi{color:var(--red);font-size:13px;}
  /* tabbed detail */
  .pinned{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;}
  .tabwrap{display:flex;gap:14px;align-items:flex-start;}
  .tabrail{display:flex;flex-direction:column;gap:4px;min-width:160px;flex-shrink:0;}
  .txgroup{border:1px solid var(--border);border-radius:8px;padding:6px;margin-top:6px;display:flex;flex-direction:column;gap:4px;}
  .txglabel{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:2px 4px 4px;}
  /* grouped skills */
  .skcat{margin-bottom:16px;}
  .skcat-h{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:7px;}
  .skcat-n{color:var(--muted);font-weight:500;}
  .skrow{display:grid;grid-template-columns:175px 76px 1fr 14px;align-items:baseline;gap:10px;padding:5px 6px;line-height:1.4;border-radius:6px;cursor:pointer;transition:background .12s;}
  .skrow:hover{background:rgba(120,160,255,.07);}
  .skrow.open{background:rgba(120,160,255,.12);}
  .skname{font-weight:600;font-size:13px;color:var(--text);word-break:break-word;}
  .skbadge{font-size:9px;font-weight:700;background:#1f6f43;color:#d6ffe6;padding:1px 6px;border-radius:5px;letter-spacing:.03em;white-space:nowrap;justify-self:start;}
  .skbadge-sp{display:inline-block;}
  .skdesc{font-size:12px;color:var(--muted);}
  .skchev{color:var(--muted);font-size:14px;justify-self:end;opacity:.6;}
  .skrow.open .skchev{transform:rotate(90deg);}
  /* skill info panel */
  .skinfo{background:var(--panel,#11151c);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:11px 14px;margin:2px 0 9px;}
  .skinfo-h{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .skinfo-meta{font-size:11px;color:var(--muted);margin-bottom:9px;}
  .skinfo-meta code{background:rgba(255,255,255,.06);padding:1px 4px;border-radius:3px;}
  .skinfo-sec{margin-bottom:9px;}
  .skinfo-sec b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);margin-bottom:3px;}
  .skinfo-sec>div{font-size:12.5px;color:var(--text);line-height:1.45;}
  .skinfo-pre{background:#0b0e13;border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:11.5px;line-height:1.5;color:#cfe;white-space:pre-wrap;word-break:break-word;overflow-x:auto;margin:0;}
  .tabbtn{background:var(--chip);border:1px solid var(--border);color:var(--muted);text-align:left;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .12s;}
  .tabbtn:hover{color:var(--text);border-color:var(--accent);}
  .tabbtn.active{background:var(--accent);color:#0d1117;font-weight:700;border-color:var(--accent);}
  .tabpanels{flex:1;min-width:0;}
  .tabpanel{display:none;}
  .tabpanel.active{display:block;}
  table.crons .crhead td{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;border-bottom:2px solid var(--border);}
  table.crons .cmodel{font-size:11px;white-space:nowrap;}
  table.crons .mdl-set{color:#a98bff;} table.crons .mdl-def{color:var(--muted);} table.crons .mdl-none{color:var(--green);}
  @media(max-width:640px){.tabwrap{flex-direction:column;} .tabrail{flex-direction:row;flex-wrap:wrap;min-width:0;}}
</style>
</head>
<body>
<div id="gate">
  <h2>&#129302; Fleet Monitor</h2>
  <input id="pw" type="password" placeholder="Passphrase" autocomplete="current-password">
  <button onclick="checkPw()">Unlock</button>
  <div class="err" id="err"></div>
</div>
<div id="app">
  <div class="header">
    <h1>&#129302; Haderach Fleet Monitor <span class="host" id="host"></span></h1>
    <div class="meta">Updated <span id="updated">&mdash;</span> &middot; <a class="refresh" onclick="load()">&#8635; Refresh</a></div>
  </div>
  <div class="sysbar" id="sysbar"></div>
  <div class="grid" id="grid"></div>
  <div class="footer">HAD-039 Fleet Monitor &middot; data refreshes every 5 min &middot; LLM-free &middot; tap a card for detail</div>
</div>
<div id="detail"><div class="dpanel" id="dpanel"></div></div>
<script src="app.js?v=20260620f"></script>
</body>
</html>
